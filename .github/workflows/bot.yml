name: Albo Pretorio Bot

on:
  schedule:
    - cron: '0 5-20 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 selenium==4.18.1

      - name: Carica file atti già visti (cache)
        uses: actions/cache@v4
        with:
          path: seen_atti.json
          key: seen-atti-${{ github.run_id }}
          restore-keys: |
            seen-atti-

      - name: Esegui il bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py

      - name: Salva file atti già visti
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_atti.json
          key: seen-atti-${{ github.run_id }}
